<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Омск - Шахматная столица | Прямая трансляция</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        .operator-panel, .download-section { display: none; }
        .brand-header .hashtag { font-size: 18px; }
        .chess-layout { grid-template-columns: 1fr 300px; }
        .qr-section {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header class="brand-header">
        <div class="container">
            <div class="logo-container">
                <div class="title-container">
                    <h1>Омская область</h1>
                    <h2 class="chess-caption">#ШахматнаяСтолица</h2>
                </div>
            </div>
            <div class="hashtag">Прямая трансляция с ПМЭФ-2026</div>
        </div>
    </header>

    <main class="container">
        <div class="chess-layout">
            <div class="board-container">
                <div id="board" style="width: 500px; height: 500px;"></div>
                <div class="move-history">
                    <h3>Ходы партии</h3>
                    <div id="moveList" class="move-list"></div>
                </div>
            </div>
            <div class="sidebar">
                <div class="qr-section">
                    <h4>Омская область</h4>
                    <div id="qrcode"></div>
                    <p>omsk.travel</p>
                    <p style="font-size: 12px; margin-top: 10px;">#ОмскШахматнаяСтолица</p>
                </div>
                <div style="text-align: center; margin-top: 20px; color: #666;">
                    Трансляция в реальном времени<br>
                    <small>ПМЭФ-2026 • Санкт-Петербург</small>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Правительство Омской области. Прямая трансляция с ПМЭФ-2026</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        const WS_URL = 'ws://nnc-software.ddns.net:8001/ws';
        const PUBLIC_URL = 'http://nnc-software.ddns.net:8082/public.html';
        
        let board = null;
        let game = new Chess();
        let socket = null;

        $(document).ready(function() {
            initBoard();
            connectWebSocket();
            generateQRCode();
        });

        function initBoard() {
            var config = {
                draggable: false,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('board', config);
            $(window).resize(board.resize);
        }

        function connectWebSocket() {
            socket = new WebSocket(WS_URL);
            
            socket.onopen = function() {
                console.log('✅ Подключено к трансляции');
            };
            
            socket.onclose = function() {
                console.log('❌ Отключено. Переподключение...');
                setTimeout(connectWebSocket, 3000);
            };
            
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === 'init' || data.type === 'move') {
                    if (data.fen) {
                        game.load(data.fen);
                        board.position(data.fen);
                    }
                    if (data.moves) {
                        updateMoveList(data.moves);
                    }
                }
                if (data.type === 'new_game') {
                    game.reset();
                    board.start();
                    $('#moveList').empty();
                }
            };
        }

        function updateMoveList(moves) {
            const $moveList = $('#moveList');
            $moveList.empty();
            moves.forEach((move, index) => {
                const moveNumber = Math.floor(index/2) + 1;
                if (index % 2 === 0) {
                    $moveList.append(`<div class="move-item">${moveNumber}. ${move}</div>`);
                } else {
                    const lastItem = $moveList.children().last();
                    if (lastItem.length) {
                        lastItem.html(lastItem.text() + ` ${move}`);
                    }
                }
            });
        }

        function generateQRCode() {
            const container = document.getElementById('qrcode');
            if (container) {
                container.innerHTML = '';
                const canvas = document.createElement('canvas');
                container.appendChild(canvas);
                QRCode.toCanvas(canvas, 'https://omsk.travel', {
                    width: 150,
                    margin: 1,
                    color: { dark: '#003366', light: '#ffffff' }
                });
            }
        }
    </script>
</body>
</html>
